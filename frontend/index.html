<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>GramUrja-AI - Smart Energy Management</title>
    
    <!-- Tailwind CSS with Forms and Container Queries -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <!-- React & Related Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/history@5/umd/history.development.js"></script>
    <script src="https://unpkg.com/react-router@6.3.0/umd/react-router.development.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.development.js"></script>
    <!-- changed: Babel 7 standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7306ef",
                        "accent": "#7306ef",
                        "background-light": "#f7f5f8",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "sans": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem",
                        "md": "0.375rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbars for cleaner prototype */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;
        const { MemoryRouter, Routes, Route, Link, useNavigate, useLocation, Navigate } = ReactRouterDOM;

        const API_BASE = "http://127.0.0.1:8000";

        // changed: safe fetch helper for Live Server/offline mode
        const safeFetchJson = async (url, fallback = null) => {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("request failed");
                return await res.json();
            } catch (_) {
                return fallback;
            }
        };

        const INDIAN_STATES = [
            "Andhra Pradesh", "Arunachal Pradesh", "Assam", "Bihar", "Chhattisgarh", "Goa", "Gujarat", "Haryana", "Himachal Pradesh", "Jharkhand", "Karnataka", "Kerala", "Madhya Pradesh", "Maharashtra", "Manipur", "Meghalaya", "Mizoram", "Nagaland", "Odisha", "Punjab", "Rajasthan", "Sikkim", "Tamil Nadu", "Telangana", "Tripura", "Uttar Pradesh", "Uttarakhand", "West Bengal", "Delhi", "Jammu and Kashmir", "Ladakh", "Puducherry"
        ];
        const ONBOARD_APPLIANCES = ["AC", "Fan", "Light", "Washing Machine"];
        const SCHEDULE_USER_TO_BACKEND_NAME = { AC: ["Air Conditioner"], "Washing Machine": ["Washing Machine"], Fan: ["Fan"], Light: ["Light"] };

        // --- Common Components & Auth ---

        const ThemeToggle = () => {
            const [dark, setDark] = useState(false);
            const toggle = () => {
                const isDark = !dark;
                setDark(isDark);
                document.documentElement.classList.toggle('dark', isDark);
            };
            return (
                <button onClick={toggle} className="p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors flex items-center justify-center">
                    <span className="material-symbols-outlined">{dark ? 'light_mode' : 'dark_mode'}</span>
                </button>
            );
        };

        const ProtectedRoute = ({ element }) => {
            const isAuthed = typeof window !== "undefined" && localStorage.getItem("auth") === "true";
            return isAuthed ? element : <Navigate to="/login" replace />;
        };

        const LoginPage = () => {
            const navigate = useNavigate();
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");
            const [loading, setLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setError("");
                setLoading(true);
                setTimeout(() => {
                    const ok = email.includes("@") && password.length >= 4;
                    if (ok) {
                        localStorage.setItem("auth", "true");
                        setLoading(false);
                        navigate("/", { replace: true });
                    } else {
                        setLoading(false);
                        setError("Invalid email or password. Please try again.");
                    }
                }, 700);
            };

            return (
                <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-slate-950 px-4">
                    <div class="relative max-w-md w-full">
                        <div class="absolute -inset-[1px] bg-gradient-to-r from-primary to-cyan-400 opacity-60 blur-lg rounded-3xl"></div>
                        <div class="relative bg-white/10 dark:bg-slate-900/60 backdrop-blur-2xl border border-white/20 rounded-3xl shadow-2xl p-8 space-y-6">
                            <div class="text-center space-y-2">
                                <h1 class="text-3xl font-extrabold tracking-tight text-white">GramUrja-AI</h1>
                                <p class="text-slate-200 text-sm">Smart Energy Intelligence Platform</p>
                            </div>
                            <form class="space-y-4" onSubmit={handleSubmit}>
                                <div class="space-y-1.5">
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-200">Email</label>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        class="w-full rounded-xl border border-white/20 bg-white/5 px-3 py-2.5 text-sm text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                        placeholder="you@example.com"
                                        required
                                    />
                                </div>
                                <div class="space-y-1.5">
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-200">Password</label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        class="w-full rounded-xl border border-white/20 bg-white/5 px-3 py-2.5 text-sm text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                        placeholder="••••••••"
                                        required
                                    />
                                </div>
                                {error && (
                                    <p class="text-xs text-red-300 bg-red-900/40 border border-red-500/40 rounded-lg px-3 py-2">
                                        {error}
                                    </p>
                                )}
                                <button
                                    type="submit"
                                    disabled={loading}
                                    class="w-full inline-flex items-center justify-center rounded-xl bg-primary text-white text-sm font-semibold py-2.5 mt-2 shadow-lg shadow-primary/30 hover:bg-primary/90 disabled:opacity-70 disabled:cursor-not-allowed transition-colors"
                                >
                                    {loading ? "Signing in..." : "Login"}
                                </button>
                            </form>
                            <p class="text-[11px] text-slate-300/90 text-center">
                                Demo login accepts any email and password with at least 4 characters.
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const Header = () => {
            const navigate = useNavigate();
            const [notifications, setNotifications] = useState([]);
            const [hasNew, setHasNew] = useState(false);
            const [open, setOpen] = useState(false);
            const [showProfileMenu, setShowProfileMenu] = useState(false);

            useEffect(() => {
                let cancelled = false;
                const fetchRecommendation = () => {
                    fetch(`${API_BASE}/ai-recommendation`)
                        .then((r) => r.json())
                        .then((data) => {
                            if (cancelled) return;
                            if (data && data.id) {
                                const idStr = String(data.id);
                                const lastId = localStorage.getItem("lastAiRecId");
                                if (data.alert && idStr !== lastId) {
                                    const notif = {
                                        id: data.id,
                                        device: data.device,
                                        reason: data.reason,
                                        estimated_savings: data.estimated_savings,
                                        action: data.action,
                                        timestamp: new Date().toLocaleTimeString(),
                                    };
                                    setNotifications((prev) => [notif, ...prev].slice(0, 5));
                                    setHasNew(true);
                                    localStorage.setItem("lastAiRecId", idStr);
                                }
                            }
                        })
                        .catch(() => {});
                };
                fetchRecommendation();
                const interval = setInterval(fetchRecommendation, 60000);
                return () => {
                    cancelled = true;
                    clearInterval(interval);
                };
            }, []);

            const handleLogout = () => {
                localStorage.removeItem("auth");
                navigate("/login", { replace: true });
            };

            const goToScheduling = () => {
                setOpen(false);
                navigate("/scheduling");
            };

            return (
                <header className="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md px-6 lg:px-10 py-3 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                        <div className="bg-primary p-1.5 rounded-lg flex items-center justify-center text-white">
                            <span className="material-symbols-outlined text-2xl">bolt</span>
                        </div>
                        <h2 className="text-slate-900 dark:text-white text-xl font-bold tracking-tight">GramUrja-AI</h2>
                    </div>
                    <div className="flex items-center gap-4 lg:gap-6">
                        <div className="hidden md:flex items-center gap-1 bg-slate-100 dark:bg-slate-800 rounded-full px-3 py-1">
                            <span className="material-symbols-outlined text-sm text-green-500">check_circle</span>
                            <span className="text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wider">System Online</span>
                        </div>
                        <div className="flex items-center gap-2 relative">
                            <ThemeToggle />
                            <div className="relative">
                                <button
                                    className="relative p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors"
                                    onClick={() => {
                                        setOpen((o) => !o);
                                        setHasNew(false);
                                    }}
                                >
                                    <span className="material-symbols-outlined">notifications</span>
                                    {hasNew && (
                                        <span className="absolute -top-0.5 -right-0.5 h-2.5 w-2.5 rounded-full bg-red-500 border border-white"></span>
                                    )}
                                </button>
                                {open && (
                                    <div className="absolute right-0 mt-2 w-80 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-xl z-20">
                                        <div className="px-4 py-3 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                                            <p className="text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider">
                                                AI Recommendations
                                            </p>
                                            {notifications.length > 0 && (
                                                <span className="text-[10px] text-slate-400">
                                                    {notifications.length} new
                                                </span>
                                            )}
                                        </div>
                                        <div className="max-h-64 overflow-y-auto">
                                            {notifications.length === 0 ? (
                                                <div className="px-4 py-6 text-xs text-slate-500 dark:text-slate-400 text-center">
                                                    No new recommendations.
                                                </div>
                                            ) : (
                                                notifications.map((n) => (
                                                    <div key={n.id} className="px-4 py-3 border-b border-slate-100 dark:border-slate-800 last:border-b-0">
                                                        <p className="text-sm font-semibold text-slate-900 dark:text-white flex items-center gap-1">
                                                            <span className="material-symbols-outlined text-xs text-amber-500">bolt</span>
                                                            Device: {n.device}
                                                        </p>
                                                        <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">
                                                            {n.reason}
                                                        </p>
                                                        <p className="text-xs text-emerald-600 dark:text-emerald-400 mt-1 font-semibold">
                                                            Estimated savings: {n.estimated_savings}
                                                        </p>
                                                        <div className="mt-2 flex items-center justify-between">
                                                            <span className="text-[10px] text-slate-400">{n.timestamp}</span>
                                                            <button
                                                                onClick={goToScheduling}
                                                                className="text-[11px] font-semibold text-primary hover:underline"
                                                            >
                                                                View Details
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                            <Link to="/settings" className="p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                                <span className="material-symbols-outlined">settings</span>
                            </Link>
                            <div className="h-8 w-px bg-slate-200 dark:bg-slate-800 mx-2"></div>
                            <div className="relative flex items-center gap-3 pl-2">
                                <div className="text-right hidden sm:block">
                                    <p className="text-sm font-semibold text-slate-900 dark:text-white leading-none">Avinash</p>
                                    <p className="text-[11px] text-slate-500 font-medium">Home Pro Plan</p>
                                </div>
                                <button
                                    onClick={() => setShowProfileMenu((v) => !v)}
                                    className="h-10 w-10 rounded-full bg-slate-200 border-2 border-white shadow-sm overflow-hidden bg-cover bg-center focus:outline-none focus:ring-2 focus:ring-primary"
                                    style={{backgroundImage: "url('https://lh3.googleusercontent.com/aida-public/AB6AXuD-WxgsuWPBjP0OP1xPeBftqYVS66rEp8xTB29WpwPzWvxYjcsALZWkeHWIqMYDnUY812qlFqBAMr8adRRKsYa67ljK9TrO-iB3lLHlSzqCv8ofNqAstmITJjCpdaMpeLbeBSxm5ZdHj026qjrfbMl5F1w6YXMyQbeSwfU80M38CqneVT-JSLySMmXaTibN6FzJhz5A5oz7E-30tuqLyZpZDZHwf6Dlq6_KatwLlKM4CysS2JKmLgeE6bCv3EENwjqvL719iKwxjD6A')"}}
                                >
                                </button>
                                {showProfileMenu && (
                                    <div className="absolute right-0 top-12 w-40 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-lg z-20">
                                        <button
                                            onClick={handleLogout}
                                            className="w-full text-left px-4 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-t-xl"
                                        >
                                            Logout
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const Sidebar = () => {
            const location = useLocation();
            const navItems = [
                { path: "/", icon: "dashboard", label: "Overview" },
                { path: "/analytics", icon: "analytics", label: "Analytics" },
                { path: "/forecast", icon: "show_chart", label: "AI Forecast" },
                { path: "/scheduling", icon: "calendar_today", label: "Scheduling" },
                { path: "/tariffs", icon: "payments", label: "Tariffs" },
                { path: "/assistant", icon: "mic", label: "Assistant" },
                { path: "/onboarding", icon: "info", label: "Guide" },
            ];

            return (
                <aside class="w-full lg:w-64 flex flex-col gap-1">
                    {navItems.map(item => (
                        <Link 
                            key={item.path}
                            to={item.path} 
                            class={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${location.pathname === item.path ? 'bg-primary text-white shadow-lg shadow-primary/20' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 font-medium'}`}
                        >
                            <span class="material-symbols-outlined">{item.icon}</span>
                            <span>{item.label}</span>
                        </Link>
                    ))}
                    <div class="mt-8 px-4">
                        <div class="rounded-xl p-4 border border-primary/20 dark:bg-slate-800/50">
                            <p class="text-primary text-xs font-bold uppercase tracking-widest mb-1">Efficiency Tip</p>
                            <p class="text-slate-700 dark:text-slate-300 text-sm">Schedule laundry for 1 PM to maximize solar utilization.</p>
                        </div>
                    </div>
                </aside>
            );
        };

        const ProfileBootstrap = ({ children }) => {
            const location = useLocation();
            const navigate = useNavigate();
            useEffect(() => {
                const isLogin = location.pathname === "/login";
                const authed = localStorage.getItem("auth") === "true";
                if (isLogin || !authed) return;
                let cancelled = false;

                // changed: do not force redirect to /setup when backend is unreachable
                safeFetchJson(`${API_BASE}/user/profile`, null).then((profile) => {
                    if (cancelled) return;
                    const localComplete = localStorage.getItem("onboardingComplete") === "true";
                    const remoteComplete = profile && profile.state && String(profile.state).trim() !== "";
                    const complete = localComplete || remoteComplete;

                    if (!complete && location.pathname !== "/setup") navigate("/setup", { replace: true });
                    if (complete && location.pathname === "/setup") navigate("/", { replace: true });
                });

                return () => { cancelled = true; };
            }, [location.pathname, navigate]);
            return children;
        };

        const OnboardingPage = () => {
            const navigate = useNavigate();
            const [step, setStep] = useState(1);
            const [formData, setFormData] = useState({
                state: "",
                language: "en",
                house: { type: "", rooms: "", people: "" },
                appliances: [],
                applianceDetails: [],
                bill: "",
                solar: { hasSolar: false, capacity: "", netMetering: false },
                usagePattern: "",
                goal: ""
            });
            const [submitting, setSubmitting] = useState(false);
            const [error, setError] = useState("");
            const stepTitles = ["Basic Info", "House Details", "Appliances", "Energy & Solar", "Preferences"];
            const HOUSE_TYPES = ["Apartment", "Independent", "Hostel"];
            const USAGE_PATTERNS = ["Morning", "Day", "Evening", "Night"];
            const GOALS = ["Reduce Bill", "Maximize Solar", "Comfort", "Eco-friendly"];

            const syncAppliancesFromDetails = (details) => details.map((d) => d.name);

            const toggleAppliance = (name) => {
                setFormData((prev) => {
                    const has = prev.applianceDetails.some((a) => a.name === name);
                    let applianceDetails;
                    if (has) {
                        applianceDetails = prev.applianceDetails.filter((a) => a.name !== name);
                    } else {
                        applianceDetails = [...prev.applianceDetails, { name: name, count: 1, hours: 4 }];
                    }
                    return { ...prev, applianceDetails, appliances: syncAppliancesFromDetails(applianceDetails) };
                });
            };

            const updateApplianceDetail = (name, field, raw) => {
                const numVal = field !== "name" ? Math.max(0, parseFloat(raw) || 0) : raw;
                setFormData((prev) => {
                    const applianceDetails = prev.applianceDetails.map((a) =>
                        a.name === name ? { ...a, [field]: field === "count" || field === "hours" ? numVal : a[field] } : a
                    );
                    return { ...prev, applianceDetails, appliances: syncAppliancesFromDetails(applianceDetails) };
                });
            };

            const validateStep = (s) => {
                setError("");
                if (s === 1) {
                    if (!formData.state) return "Please select your state.";
                    if (!formData.language) return "Please select a language.";
                }
                if (s === 2) {
                    if (!formData.house.type) return "Please select house type.";
                    const rooms = String(formData.house.rooms).trim();
                    const people = String(formData.house.people).trim();
                    if (!rooms || Number(rooms) < 1) return "Enter a valid number of rooms (1+).";
                    if (!people || Number(people) < 1) return "Enter a valid number of people (1+).";
                }
                if (s === 3) {
                    if (!formData.applianceDetails.length) return "Select at least one appliance.";
                    for (const a of formData.applianceDetails) {
                        if (!a.count || a.count < 1) return `Set a valid count for ${a.name}.`;
                        if (a.hours === "" || a.hours < 0 || a.hours > 24) return `Set usage hours (0–24) for ${a.name}.`;
                    }
                }
                if (s === 4) {
                    const bill = String(formData.bill).trim();
                    if (!bill || Number(bill) < 0) return "Enter a valid monthly electricity bill (₹).";
                    if (formData.solar.hasSolar) {
                        const cap = String(formData.solar.capacity).trim();
                        if (!cap || Number(cap) <= 0) return "Enter solar capacity (kW) or turn off solar.";
                    }
                }
                if (s === 5) {
                    if (!formData.usagePattern) return "Select your usage pattern.";
                    if (!formData.goal) return "Select your primary goal.";
                }
                return "";
            };

            const goNext = () => {
                const err = validateStep(step);
                if (err) {
                    setError(err);
                    return;
                }
                setError("");
                if (step < 5) setStep((x) => x + 1);
            };

            const goBack = () => {
                setError("");
                if (step > 1) setStep((x) => x - 1);
            };

            const handleFinalSubmit = (e) => {
                e.preventDefault();
                const err = validateStep(5);
                if (err) {
                    setError(err);
                    return;
                }
                setError("");
                setSubmitting(true);

                // changed: local completion fallback if backend is unavailable
                fetch(`${API_BASE}/user/onboard`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(formData)
                })
                    .then((r) => {
                        if (!r.ok) throw new Error("save failed");
                        return r.json();
                    })
                    .then(() => {
                        localStorage.setItem("onboardingComplete", "true");
                        navigate("/", { replace: true });
                    })
                    .catch(() => {
                        localStorage.setItem("onboardingComplete", "true");
                        navigate("/", { replace: true });
                    })
                    .finally(() => setSubmitting(false));
            };

            const progressPct = (step / 5) * 100;
            const inputClass = "w-full rounded-xl border border-white/20 bg-white/10 backdrop-blur-sm px-3 py-2.5 text-sm text-slate-900 dark:text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary";
            const labelClass = "block text-xs font-semibold uppercase tracking-wider text-blackß dark:text-white";

            return (
                <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-slate-950 px-4 py-12">
                    <div class="relative max-w-lg w-full">
                        <div class="absolute -inset-[1px] bg-gradient-to-r from-primary to-cyan-400 opacity-50 blur-lg rounded-3xl"></div>
                        <div class="relative backdrop-blur-xl bg-white/10 dark:bg-slate-900/40 border border-white/20 rounded-3xl shadow-2xl p-8 space-y-6 transition-all duration-300">
                            <div class="text-center space-y-2">
                                <h1 class="text-2xl font-extrabold tracking-tight text-white">Welcome to Eco_Smart AI</h1>
                                <p class="text-slate-200/90 text-sm">GramUrja-AI — tune your home profile in a few steps.</p>
                                <p class="text-cyan-200/90 text-xs font-semibold">Step {step} of 5 · {stepTitles[step - 1]}</p>
                            </div>
                            <div class="h-2 rounded-full bg-white/10 overflow-hidden border border-white/10">
                                <div
                                    class="h-full rounded-full bg-gradient-to-r from-primary to-cyan-400 transition-all duration-500 ease-out"
                                    style={{ width: progressPct + "%" }}
                                />

                    { time: "08", price: 6 },
                    { time: "12", price: 5.2 },
                    { time: "18", price: 7.5 },
                    { time: "22", price: 6 }
                ],
                Kerala: [
                    { time: "00", price: 5 },
                    { time: "09", price: 5.5 },
                    { time: "13", price: 5 },
                    { time: "18", price: 7 },
                    { time: "22", price: 6 }
                ],
                "Tamil Nadu": [
                    { time: "00", price: 5 },
                    { time: "10", price: 6.5 },
                    { time: "14", price: 5 },
                    { time: "20", price: 7.5 },
                    { time: "23", price: 6 }
                ],
                Gujarat: [
                    { time: "00", price: 5 },
                    { time: "09", price: 4.5 },
                    { time: "13", price: 4.2 },
                    { time: "18", price: 7 },
                    { time: "22", price: 5.8 }
                ],
                "Uttar Pradesh": [
                    { time: "00", price: 5 },
                    { time: "09", price: 7 },
                    { time: "14", price: 6 },
                    { time: "19", price: 7.5 },
                    { time: "22", price: 6 }
                ],
                Bihar: [
                    { time: "00", price: 5 },
                    { time: "10", price: 5.5 },
                    { time: "17", price: 7.5 },
                    { time: "23", price: 5.5 }
                ],
                "Andhra Pradesh": [
                    { time: "00", price: 5 },
                    { time: "11", price: 7 },
                    { time: "15", price: 6 },
                    { time: "20", price: 7.2 },
                    { time: "23", price: 5.8 }
                ],
                Others: [
                    { time: "00", price: 6 },
                    { time: "24", price: 6 }
                ]
            };

            const currentData = tariffData[selectedState];
            const avgPrice = (currentData.reduce((sum, d) => sum + d.price, 0) / currentData.length).toFixed(2);
            const maxPrice = Math.max(...currentData.map(d => d.price));

            return (
                <div class="flex-1 space-y-8">
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <div>
                            <h2 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">Time-of-Day Pricing</h2>
                            <p class="text-slate-500 font-medium mt-1">State: <span class="text-primary font-bold">{selectedState}</span></p>
                        </div>
                        <select
                            value={selectedState}
                            onChange={(e) => setSelectedState(e.target.value)}
                            class="rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white px-4 py-2.5 text-sm font-medium focus:ring-2 focus:ring-primary focus:border-transparent shadow-sm"
                        >
                            {Object.keys(tariffData).map(state => (
                                <option key={state} value={state}>{state}</option>
                            ))}
                        </select>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 p-6 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <p class="text-sm font-medium text-slate-500 uppercase tracking-wide">Price Curve</p>
                                    <h3 class="text-4xl font-bold text-slate-900 dark:text-white mt-1">₹{avgPrice}<span class="text-sm font-normal text-slate-400 ml-1">/kWh</span></h3>
                                </div>
                                <div class="px-3 py-1 bg-blue-50 dark:bg-blue-900/20 text-blue-600 rounded-full text-sm font-bold">
                                    {currentData.length} slots
                                </div>
                            </div>

                            <div class="flex items-end justify-between gap-3 h-64 mb-6 w-full border border-red-200">
                                {currentData.map((point, i) => (
                                    <div key={i} class="flex flex-col items-center flex-1 justify-end">
                                        <div
                                            class={`w-full rounded-t-md transition-all cursor-pointer ${
                                                point.price >= maxPrice * 0.9 ? "bg-red-500" :
                                                point.price <= 4.5 ? "bg-green-500" :
                                                "bg-primary"
                                            }`}
                                            style={{
                                                height: point.price * 30 + "px",
                                                minHeight: "20px"
                                            }}
                                            title={`₹${point.price}/kWh`}
                                        ></div>
                                        <span class="text-[11px] text-slate-500 dark:text-slate-400 mt-2 font-semibold">{point.time}:00</span>
                                    </div>
                                ))}
                            </div>

                            <div class="flex gap-4 text-xs">
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 rounded bg-red-500"></div>
                                    <span class="text-slate-600 dark:text-slate-400">Peak</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 rounded bg-primary"></div>
                                    <span class="text-slate-600 dark:text-slate-400">Normal</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 rounded bg-green-500"></div>
                                    <span class="text-slate-600 dark:text-slate-400">Off-Peak</span>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="p-6 rounded-xl bg-primary text-white shadow-xl shadow-primary/20">
                                <h4 class="text-sm font-medium opacity-90 uppercase tracking-wider mb-2">Peak Rate</h4>
                                <p class="text-2xl font-bold">₹{maxPrice.toFixed(1)}/kWh</p>
                            </div>
                            <div class="p-6 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm">
                                <h4 class="text-sm font-bold text-slate-900 dark:text-white mb-4">Pricing Details</h4>
                                <div class="space-y-3 text-sm">
                                    {currentData.map((point, i) => (
                                        <div key={i} class="flex justify-between items-center">
                                            <span class="text-slate-600 dark:text-slate-400">{point.time}:00</span>
                                            <span class="font-semibold text-slate-900 dark:text-white">₹{point.price}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AssistantPage = () => {
            const [messages, setMessages] = useState([]);
            const [msg, setMsg] = useState("");
            const [isListening, setIsListening] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [language, setLanguage] = useState("en");
            const [userAppliances, setUserAppliances] = useState([]);
            const [languages, setLanguages] = useState([{ code: "en", name: "English" }, { code: "hi", name: "Hindi" }, { code: "bn", name: "Bengali" }, { code: "mr", name: "Marathi" }, { code: "te", name: "Telugu" }, { code: "ta", name: "Tamil" }, { code: "gu", name: "Gujarati" }, { code: "ur", name: "Urdu" }, { code: "kn", name: "Kannada" }, { code: "or", name: "Odia" }, { code: "pa", name: "Punjabi" }]);
            const recognitionRef = React.useRef(null);

            React.useEffect(() => {
                safeFetchJson(`${API_BASE}/assistant/languages`, null)
                    .then((data) => { if (data && data.languages && data.languages.length) setLanguages(data.languages); });
            }, []);

            React.useEffect(() => {
                safeFetchJson(`${API_BASE}/user/profile`, null).then((p) => {
                    if (p && p.language) setLanguage(p.language);
                    if (p && Array.isArray(p.appliances)) setUserAppliances(p.appliances);
                });
            }, []);

            const langToSpeechCode = { en: "en-IN", hi: "hi-IN", bn: "bn-IN", mr: "mr-IN", te: "te-IN", ta: "ta-IN", gu: "gu-IN", ur: "ur-IN", kn: "kn-IN", or: "or-IN", pa: "pa-IN" };

            const speak = (text) => {
                setIsSpeaking(true);
                if (typeof speechSynthesis === "undefined") {
                    setIsSpeaking(false);
                    return;
                }
                try {
                    speechSynthesis.cancel();
                    const speech = new SpeechSynthesisUtterance(text);
                    speech.rate = 0.95;
                    speech.pitch = 1;

                    // Pick best available voice for selected language, fall back gracefully
                    let targetLang = langToSpeechCode[language] || "en-IN";
                    try {
                        const voices = speechSynthesis.getVoices ? speechSynthesis.getVoices() : [];
                        if (voices && voices.length) {
                            const exact = voices.find(v => v.lang === targetLang);
                            const baseCode = targetLang.split("-")[0];
                            const base = voices.find(v => v.lang && v.lang.startsWith(baseCode));
                            const english = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en"));
                            const chosen = exact || base || english || voices[0];
                            if (chosen && chosen.lang) {
                                targetLang = chosen.lang;
                            }
                        }
                    } catch (_) {}

                    speech.lang = targetLang;
                    speech.onend = () => setIsSpeaking(false);
                    speech.onerror = () => setIsSpeaking(false);
                    speechSynthesis.speak(speech);
                } catch (e) {
                    console.error("TTS error:", e);
                    setIsSpeaking(false);
                }
            };

            const askAssistant = async (userText) => {
                const text = (userText || msg || "").trim();
                if (!text) return;
                setMsg("");
                setMessages((prev) => [...prev, { role: "user", text: text }]);
                try {
                    const res = await fetch(`${API_BASE}/assistant/query`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: text, language: language, appliances: userAppliances })
                    });
                    const data = await res.json();
                    const responseText = data.response || "Sorry, I could not process that.";
                    setMessages((prev) => [...prev, { role: "assistant", text: responseText }]);
                    speak(responseText);
                } catch (err) {
                    console.error("Assistant error:", err);
                    const errMsg = "Sorry, I could not connect. Please try again.";
                    setMessages((prev) => [...prev, { role: "assistant", text: errMsg }]);
                    speak(errMsg);
                }
            };

            const toggleMic = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert("Voice input is not supported. Try Chrome. You can type your question instead.");
                    return;
                }
                if (isListening && recognitionRef.current) {
                    try { recognitionRef.current.stop(); } catch (_) {}
                    setIsListening(false);
                    recognitionRef.current = null;
                    return;
                }
                try {
                    const recognition = new SpeechRecognition();
                    recognitionRef.current = recognition;
                    recognition.continuous = false;
                    recognition.interimResults = false;
                    recognition.lang = langToSpeechCode[language] || "en-IN";
                    recognition.onresult = (e) => {
                        const transcript = (e.results[0] && e.results[0][0]) ? e.results[0][0].transcript : "";
                        if (transcript) askAssistant(transcript);
                    };
                    recognition.onend = () => { setIsListening(false); recognitionRef.current = null; };
                    recognition.onerror = () => { setIsListening(false); recognitionRef.current = null; };
                    recognition.start();
                    setIsListening(true);
                } catch (err) {
                    console.error("Speech recognition error:", err);
                    setIsListening(false);
                    recognitionRef.current = null;
                }
            };

            return (
                <div class="flex-1 flex flex-col bg-slate-50 dark:bg-slate-950 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-800 h-[calc(100vh-160px)]">
                    <div class="flex-1 overflow-y-auto p-6 space-y-6">
                        <div class="max-w-3xl mx-auto text-center mb-8">
                            <h1 class="text-slate-900 dark:text-white text-3xl font-extrabold tracking-tight mb-2">Voice Assistant</h1>
                            <p class="text-slate-500 mb-4">Choose your language, then type or speak your question. Responses will be in the selected language.</p>
                            <div class="flex flex-wrap justify-center gap-2">
                                <label class="text-sm font-medium text-slate-600 dark:text-slate-400">Language:</label>
                                <select
                                    value={language}
                                    onChange={(e) => setLanguage(e.target.value)}
                                    class="rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-800 dark:text-white px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-primary"
                                >
                                    {languages.map(function(l) { return <option key={l.code} value={l.code}>{l.name}</option>; })}
                                </select>
                            </div>
                        </div>
                        {messages.length === 0 && (
                            <div class="flex items-start gap-4 max-w-2xl">
                                <div class="size-10 rounded-full bg-primary/10 flex items-center justify-center shrink-0 border border-primary/20"><span class="material-symbols-outlined text-primary">smart_toy</span></div>
                                <div class="bg-white dark:bg-slate-900 p-4 rounded-2xl rounded-tl-none border border-slate-200 dark:border-slate-800 shadow-sm text-slate-800 dark:text-slate-200">
                                    Ask in your language: (1) When will solar generation peak today? (2) When should I run the washing machine? (3) How much electricity cost can I save today?
                                </div>
                            </div>
                        )}
                        {messages.map((m, i) => (
                            <div key={i} class={"flex items-start gap-4 max-w-2xl" + (m.role === "user" ? " ml-auto flex-row-reverse" : "")}>
                                {m.role === "assistant" ? (
                                    <div class="size-10 rounded-full bg-primary/10 flex items-center justify-center shrink-0 border border-primary/20"><span class="material-symbols-outlined text-primary">smart_toy</span></div>
                                ) : null}
                                {m.role === "user" ? (
                                    <div class="size-10 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-slate-600">person</span></div>
                                ) : null}
                                <div class={"p-4 rounded-2xl shadow-sm " + (m.role === "user" ? "bg-primary text-white rounded-tr-none" : "bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-tl-none text-slate-800 dark:text-slate-200")}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div class="p-6 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800">
                        <div class="max-w-3xl mx-auto flex flex-col items-center gap-4">
                            <p class="text-sm text-slate-500">{isListening ? "Listening... Speak now" : isSpeaking ? "Speaking..." : "Tap microphone or type to ask (response in selected language)"}</p>
                            <div class="flex items-center gap-3 flex-wrap justify-center">
                                <button
                                    onClick={toggleMic}
                                    class={"flex size-20 items-center justify-center rounded-full shadow-xl transition-all " + (isListening ? "bg-red-500 text-white animate-pulse scale-110" : "bg-primary text-white hover:scale-105 active:scale-95")}
                                    title={isListening ? "Stop listening" : "Start voice input"}
                                >
                                    <span class="material-symbols-outlined text-4xl">mic</span>
                                </button>
                                <div class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 rounded-full pl-4 pr-2 py-2 border border-slate-200 dark:border-slate-700">
                                    <input
                                        value={msg}
                                        onChange={(e) => setMsg(e.target.value)}
                                        type="text"
                                        placeholder="Type your question..."
                                        class="w-48 sm:w-64 bg-transparent border-none focus:ring-0 text-slate-800 dark:text-white placeholder-slate-400 text-sm"
                                        onKeyDown={(e) => { if (e.key === "Enter") askAssistant(msg); }}
                                    />
                                    <button onClick={() => askAssistant(msg)} class="p-2 rounded-full bg-primary text-white hover:bg-primary/90">
                                        <span class="material-symbols-outlined text-lg">send</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AppLayout = () => {
            const location = useLocation();
            const isLogin = location.pathname === "/login";
            const isSetup = location.pathname === "/setup";
            const fullBleed = isLogin || isSetup;
            return (
                <div class="min-h-screen bg-slate-50 dark:bg-slate-950 flex flex-col">
                    {!fullBleed && <Header />}
                    <div class={`flex-1 ${fullBleed ? "" : "flex flex-col lg:flex-row max-w-[1600px] mx-auto w-full p-4 lg:p-8 gap-8"}`}>
                        {!fullBleed && <Sidebar />}
                        <main class={isLogin ? "flex-1" : "flex-1 overflow-y-auto no-scrollbar"}>
                            <Routes>
                                <Route path="/login" element={<LoginPage />} />
                                <Route path="/setup" element={<ProtectedRoute element={<OnboardingPage />} />} />
                                <Route path="/" element={<ProtectedRoute element={<DashboardOverview />} />} />
                                <Route path="/analytics" element={<ProtectedRoute element={<AnalyticsPage />} />} />
                                <Route path="/forecast" element={<ProtectedRoute element={<ForecastPage />} />} />
                                <Route path="/scheduling" element={<ProtectedRoute element={<SchedulingPage />} />} />
                                <Route path="/tariffs" element={<ProtectedRoute element={<TariffsPage />} />} />
                                <Route path="/assistant" element={<ProtectedRoute element={<AssistantPage />} />} />
                                <Route path="/onboarding" element={<ProtectedRoute element={<OnboardingGuide />} />} />
                                <Route path="/settings" element={<ProtectedRoute element={<div className="p-10 text-center text-slate-500">Settings Module Placeholder</div>} />} />
                                <Route path="*" element={<Navigate to="/" replace />} />
                            </Routes>
                        </main>
                    </div>
                    {!fullBleed && (
                        <div class="fixed bottom-6 right-6 lg:hidden">
                            <button class="h-14 w-14 rounded-full bg-primary text-white shadow-xl flex items-center justify-center">
                                <span class="material-symbols-outlined text-3xl">add</span>
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => (
            <MemoryRouter>
                <ProfileBootstrap>
                    <AppLayout />
                </ProfileBootstrap>
            </MemoryRouter>
        );

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
